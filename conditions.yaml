# program-3

- name: Ansible gathering facts
  hosts: local
  connection: local
  tasks:
  - name: Print Gathering facts
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"
  
  - name: check redhat or not
    ansible.builtin.debug:
      msg: "Yes package manager is redhat"
    when: ansible_facts.os_family == "RedHat"

  - name: check ubuntu or not
    ansible.builtin.debug:
      msg: "Yes package manager is ubuntu"
    when: ansible_facts.os_family == "Debian"