# program-3

- name: Installing packages
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: install packages
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:  # list of map
    - { name: "mysql", state: "absent"}  # map/dictionary
    - { name: "nginx", state: "present"}
    - { name: "zip", state: "present"}

    # loop data type is list, individual object data type is map/dictionary
    # so we have accessed like key:value in the loop

    