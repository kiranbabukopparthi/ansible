To read the data dynamically we use module called ansible.builtin.set_fact
ansible.builtin.set_fact
This builtin is used to set the variable dynamically.

There is a command called lookup
This is used to find the file 
student_yaml: {{ lookup('file', students.yaml) | from_yaml }} 
here lookup will see for the students.yaml file 
and from_yaml filter will assign it to student_yaml variable



To look for a file, we use lookup
