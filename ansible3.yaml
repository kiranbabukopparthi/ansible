Shell vs Ansible
No tool is capable of 100 percent automation. If we consider ansible,
and it doens't have modules or collections.
Then ansible give two options
1. ansible command module
2. ansible shell module


ansible.builtin.command  vs  ansible.builtin.shell

comnand module
simple commands, you can execute
you can't get complete shell enviornment of the remote server.
More secure than shell module
Redirections and piping won't work here

shell module
complex script, you can execute here
you will get complete shell enviornment of the remote server.
Less secure than command module
Redirections and piping will work here

