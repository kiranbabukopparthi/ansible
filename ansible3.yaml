CONDITIONS
Refer conditions.YAML
conditions are actually used to varify whether to run the task or not in ansible

Here indentation is important
- name: Demo on conditions
  hosts: local
  connection: local
  vars:
    IS_LIVE: true
  tasks:
  - name: check live or not
    ansible.builtin.debug:
      msg: "Yes, it is Live"
    when: IS_LIVE

Here when will be executed, if it is true then the msg will be printed


