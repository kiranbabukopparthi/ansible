# program-4

- name: Demo on filters
  hosts: local
  connection: local
  vars:
    course: "DevOps with AWS"
    myip: 246.277.377.91
    topics: linux, shell, ansible, terraform
    tagsmap:
      name: ansible
      project: roboshop
      component: catalogue
    tagslist: [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]

  tasks:
  - name: greeting
    ansible.builtin.debug:
      msg: "Hi, {{ GREETING | default('Good Morning') }}"
  
  - name: convert string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"
  
  - name: convert map to list
    ansible.builtin.debug:
      msg: "{{ tagsmap | dict2items }}"

  - name: convert list to map
    ansible.builtin.debug:
      msg: "{{ tagslist | items2dict }}"
  
  - name: read students yaml
    ansible.builtin.set_fact: # setting the variable
      student_yaml: "{{ lookup('file','student.yaml') | from_yaml }}"
  
  - name: convert yaml to json
    ansible.builtin.debug:
      msg: "{{ student_yaml | to_nice_json }}"
  
  - name: convert lower to upper
    ansible.builtin.debug:
      msg: "{{ course | upper }}"
  
  - name: convert upper to lower
    ansible.builtin.debug:
      msg: "{{ course | lower }}"

  - name: check ipv4
    ansible.builtin.debug:
      msg: "{{ myip | ansible.utils.ipv4 }}"